# 自动化标注主配置
#
# 建议把真实密钥放在环境变量里，例如：
#   $env:DASHSCOPE_API_KEY="..."
#   $env:QWEN397B_API_KEY="..."
# 也可以复制本文件为 configs/autolabel.local.yaml 后填真实值；该本地文件已被 .gitignore 忽略。

pipeline_id: autolabel_dag_v1
pipeline_version: 0.1.0

# 所有 key 都在这里登记。代码不会限定只能用某一家模型；
# 每个模型通过 credential_ref 选择自己的 key、base_url 或 endpoint。
credentials:
  dashscope_generation:
    api_key_env: DASHSCOPE_API_KEY
    api_key: ${DASHSCOPE_API_KEY}

  qwen_classifier:
    api_key_env: QWEN397B_API_KEY
    api_key: ${QWEN397B_API_KEY}
    base_url: ${QWEN397B_API_URL:-https://deepseek.gds-services.com/vllm-qwen35b/v1}

  qwen_geometry_vlm:
    api_key_env: QWEN397B_API_KEY
    api_key: ${QWEN397B_API_KEY}
    base_url: ${QWEN_GEOMETRY_API_URL:-https://deepseek.gds-services.com/vllm-qwen35b/v1}

  local_or_private_model:
    api_key_env: PRIVATE_MODEL_API_KEY
    api_key: ${PRIVATE_MODEL_API_KEY}
    base_url: ${PRIVATE_MODEL_BASE_URL}

paths:
  i2i_project: C:\Users\chang\Documents\数据标注\I2I
  classification_script: scripts/classification.py
  raw_images_dir: data/raw/images
  raw_videos_dir: data/raw/videos
  image_sequence_dir: data/staging/image_sequence
  image_sequence_manifest: data/staging/image_sequence/manifest.csv
  metadata_dir: data/processed/metadata
  crop_dir: data/processed/crops
  mask_dir: data/processed/masks
  i2i_output_dir: data/processed/i2i_outputs
  export_dir: data/exports
  labelstudio_export: data/exports/labelstudio/import.json

# 项目模块层。业务 DAG 只依赖模块，不直接依赖零散脚本路径。
# 当前 backend 仍可兼容已有 I2I 项目和 classification.py；后续可以把实现迁入本仓库后替换 backend。
modules:
  generation:
    backend: i2i_external
    backends:
      i2i_external:
        project_dir: C:\Users\chang\Documents\数据标注\I2I
        entrypoint: src/main.py

  classification:
    backend: external_script
    backends:
      external_script:
        script_path: scripts/classification.py
      dry_run_rule:
        labels:
          - label_key: helmet
            label_value: unknown
          - label_key: reflective_vest
            label_value: unknown
          - label_key: phone_usage
            label_value: unknown

  geometry:
    backend: detector_services

# 模型注册表。新增或替换模型时，只改这里和下面的 active/model_ref。
models:
  generation:
    active_vlm: qwen_grid_selector
    active_image_generator: wan_image_editor
    vlm:
      qwen_grid_selector:
        provider: dashscope
        model_name: aios-smart-eye-vlm
        model_version: null
        credential_ref: dashscope_generation
        api_key_env: DASHSCOPE_API_KEY
        endpoint_env: DASHSCOPE_VLM_ENDPOINT
        endpoint: ${DASHSCOPE_VLM_ENDPOINT}

      custom_grid_selector:
        provider: custom
        model_name: replace_with_vlm_model
        model_version: null
        credential_ref: local_or_private_model
        api_key_env: PRIVATE_MODEL_API_KEY
        endpoint_env: CUSTOM_VLM_ENDPOINT
        endpoint: ${CUSTOM_VLM_ENDPOINT}

    image_generators:
      wan_image_editor:
        provider: dashscope
        model_name: wan2.7-image-pro
        model_version: null
        credential_ref: dashscope_generation
        api_key_env: DASHSCOPE_API_KEY
        endpoint_env: DASHSCOPE_WAN_ENDPOINT
        endpoint: ${DASHSCOPE_WAN_ENDPOINT}

      custom_i2i_generator:
        provider: custom
        model_name: replace_with_i2i_model
        model_version: null
        credential_ref: local_or_private_model
        api_key_env: PRIVATE_MODEL_API_KEY
        endpoint_env: CUSTOM_I2I_ENDPOINT
        endpoint: ${CUSTOM_I2I_ENDPOINT}

  classification:
    active_model: qwen397b_vlm_classifier
    candidates:
      qwen397b_vlm_classifier:
        provider: openai_compatible
        model_name: ${QWEN397B_MODEL:-aios-smart-eye-vlm}
        model_version: null
        classifier_type: vlm
        classifier_name: aios-smart-eye-vlm
        classifier_version: external
        prompt_version: crop_industrial_safety_v2
        credential_ref: qwen_classifier
        base_url: ${QWEN397B_API_URL:-https://deepseek.gds-services.com/vllm-qwen35b/v1}

      private_vlm_classifier:
        provider: custom
        model_name: replace_with_classifier_model
        model_version: null
        classifier_type: vlm
        classifier_name: private_vlm_classifier
        classifier_version: external
        prompt_version: replace_with_prompt_version
        credential_ref: local_or_private_model
        base_url: ${PRIVATE_MODEL_BASE_URL}

  geometry:
    candidates:
      ppe_person_vlm_labelstudio_detector:
        provider: openai_compatible
        service_type: vlm_detector
        backend: vlm_labelstudio_detector
        geometry_source: detector
        model_name: ${QWEN_GEOMETRY_MODEL:-aios-smart-eye-vlm}
        model_version: vlm-pre-annotation-v1
        credential_ref: qwen_geometry_vlm
        base_url: ${QWEN_GEOMETRY_API_URL:-https://deepseek.gds-services.com/vllm-qwen35b/v1}
        temperature: 0.0
        max_tokens: 2000
        request_image_max_side: 1280
        coordinate_units: auto
        auto_detect_coordinate_units: true
        use_response_format: true
        response_format_type: json_object
        system_message: |
          You are a strict JSON API for computer-vision annotation.
          Return only one valid JSON object.
          Do not output analysis, thinking process, explanations, markdown, bullet points, or any text outside JSON.
        prompt_version: person_labelstudio_full_body_bbox_v2
        parse_retry_count: 0
        fail_on_parse_error: true
        store_raw_response: false

      ppe_person_detector_http:
        service_type: detector
        geometry_source: detector
        model_name: replace_with_detector_name
        model_version: replace_with_detector_version
        endpoint: http://127.0.0.1:8001/detect
        method: POST
        timeout_seconds: 60

      area_segmenter_http:
        service_type: segmentation_model
        geometry_source: segmentation_model
        model_name: replace_with_segmenter_name
        model_version: replace_with_segmenter_version
        endpoint: http://127.0.0.1:8002/segment
        method: POST
        timeout_seconds: 120

      local_detector_command:
        service_type: detector
        geometry_source: detector
        model_name: replace_with_local_model_name
        model_version: replace_with_local_model_version
        command:
          - python
          - C:\path\to\detector_service_cli.py
          - --image
          - "{image_uri}"
          - --output-json
          - "{output_json}"
        timeout_seconds: 120

preprocess:
  copy_images: true
  video_frame_stride: 30
  video_max_frames: null
  # cpu: OpenCV 逐帧解码；gpu: FFmpeg + -hwaccel；auto: 优先 GPU，失败回退 CPU。
  video_decode_mode: cpu
  ffmpeg_path: ffmpeg
  video_gpu_hwaccel: cuda
  video_gpu_fallback_to_cpu: true
  # fail: 任一坏视频中断；skip: 跳过坏视频并继续生成 manifest。
  video_error_policy: skip
  default_source_type: manual_upload

generation:
  enabled: true
  vlm_model_key: qwen_grid_selector
  image_model_key: wan_image_editor
  grid_layout: 4x4
  edit_bbox_expand_ratio: 0.2
  crop_expand_ratio: 0.1
  workers: 1
  skip_existing: true
  dry_run: false

direct_annotation:
  enabled: true
  default_task_key: ppe_person
  crop_expand_ratio: 0.05
  min_box_confidence: 0.0
  min_box_width: 4
  min_box_height: 4
  min_box_area: 16
  max_box_aspect_ratio: 20.0
  cleanup_existing_crops: true
  batch_size: 1
  workers: 1
  json_retry_attempts: 3
  # 可选复核：VLM 出框 -> crop -> 再问 VLM crop 是否包含完整可见人体。
  # 默认关闭；打开后，复核不通过会写入 objects[].quality_check，不会跳过后续分类。
  crop_review:
    enabled: false
    model_ref: ppe_person_vlm_labelstudio_detector
    target_object_type: person
    reviewer: vlm_crop_reviewer
    prompt_version: crop_full_person_review_v1
    failed_issue_flag: incomplete_person_crop
    record_passed: false
    use_response_format: true
    response_format_type: json_object
    max_tokens: 600
    prompt: |
      你是一个严格的工业安全数据质检员。请检查这张人体检测框裁剪图（crop）是否包含一个完整可见的人体。

      判定规则：
      1. crop 中必须能看到清晰的人体主体。
      2. 如果头部在 crop 边缘被截断，判定为不通过。
      3. 如果脚部或鞋子在 crop 边缘被截断，判定为不通过。
      4. 如果人体明显偏离 crop，或 crop 只包含背景、柜体、设备、地面，判定为不通过。
      5. 如果人体只是被原场景中的设备、栏杆或其他物体遮挡，但 crop 边界没有额外截断人体，可判定为通过。

      只输出一个合法 JSON object，不要 markdown，不要解释文字。输出第一个字符必须是 {，最后一个字符必须是 }：
      {
        "contains_person": true,
        "is_complete_visible_person": true,
        "missing_parts": [],
        "reason": ""
      }

classification:
  enabled: true
  model_key: qwen397b_vlm_classifier
  skip_source_types:
    - generated
  delay_seconds: 0.5
  max_tokens: 2000
  request_image_max_side: 1024
  min_crop_width: 4
  min_crop_height: 4
  max_crop_aspect_ratio: 20.0
  parse_retry_count: 0
  use_response_format: true
  text_fallback_enabled: false
  log_parse_fallback: false

detector_services:
  default_task_key: ppe_person
  services:
    ppe_person:
      model_ref: ppe_person_vlm_labelstudio_detector
      target_label: Person
      default_object_type: person
      object_id_prefix: person
      prompt: |
        # Role
        你是一个专业的计算机视觉数据标注专家和自动化脚本引擎。你的任务是精准识别图像中的指定目标，并将其坐标转化为完全符合 Label Studio 解析标准的 JSON 格式。

        # Task
        请仔细分析用户输入的图像，找出所有符合定义的【目标对象】，计算它们的边界框（Bounding Box），并严格按照规定的 JSON 结构输出。

        # Target Object Definition
        当前任务需要识别的目标是：人员 (Person)。
        (注：如果有多个人员重叠或部分遮挡，请尽可能分别标注出每一个可见个体的轮廓。)

        # Full Visible Person Box Rules
        你的边界框必须框住【画面中可见的人体完整范围】，而不是只框住头部、上半身、躯干或腿部中段。
        如果一个人只露出局部身体，也必须标注这个人的所有可见身体范围；不要因为脚部、头部或部分身体不可见就漏标这个人。
        1. 如果头部可见，框的上边界必须从头顶、头发或安全帽的最高可见点开始。
        2. 如果脚部或鞋子可见，框的下边界必须覆盖到脚底、鞋底或脚尖的最低可见点。
        3. 只要画面中存在可见脚部/鞋子，就不要把框截断在膝盖、小腿、脚踝上方或鞋子上方。
        4. 如果脚部被画面边缘裁掉、被遮挡物遮挡、或确实不可见，允许输出半身/局部人体框；此时框的下边界应覆盖到该人体在画面中的最低可见身体部位。
        5. 如果手臂、背包、安全帽、反光衣、鞋子等属于该人员身体或穿戴物的可见部分，也应包含在同一个 Person 框内。
        6. 不要把影子、地面空白、大面积背景算入人体框，但宁可轻微外扩 2%-5%，也不要漏掉脚、鞋、手臂或头部。

        # Box Self-check Before Output
        在输出每个 Person 框之前，请逐一自检：
        - 这个框是否从该人的最高可见点覆盖到最低可见点？
        - 如果脚/鞋可见，框底部是否已经到达脚底/鞋底/脚尖？
        - 是否错误地把完整站立人员标成了半身框？
        - 是否漏掉了伸出的手臂、头盔、鞋子或其他穿戴物？
        只有通过上述检查后，才输出该框。

        # Coordinate Rules (Label Studio Standard)
        Label Studio 要求的边界框坐标必须是基于图像宽高的**百分比 (0.0 - 100.0)**，绝对不要输出像素坐标：
        1. `x`: 边界框左上角 X 坐标占图像总宽度的百分比。
        2. `y`: 边界框左上角 Y 坐标占图像总高度的百分比。
        3. `width`: 边界框宽度占图像总宽度的百分比。
        4. `height`: 边界框高度占图像总高度的百分比。
        5. 所有 `x`、`y`、`width`、`height` 数值都必须落在 0.0 到 100.0 之间。
        6. 如果你先估计出了像素坐标，必须先换算成百分比再输出：x = pixel_x / image_width * 100，y = pixel_y / image_height * 100。
        7. 不要输出 `x1/y1/x2/y2`，不要输出像素单位，不要输出大于 100 的坐标值。

        # Output Format constraints
        1. 你的输出必须是合法的、可解析的 JSON 格式。
        2. 绝对不要输出任何 JSON 代码块之外的解释性文字、问候语或 Markdown 标记（如 ```json）。
        3. 绝对不要输出 Thinking Process、分析步骤、编号列表或自然语言解释。
        4. 输出顶层必须是一个 JSON object，不能是数组。
        5. 如果图中没有发现目标，请输出包含空 predictions 的结构（`"result": []`）。

        # JSON Schema Template
        请严格将你的识别结果填入以下结构中：

        {
          "data": {
            "image": "image.jpg"
          },
          "predictions": [
            {
              "model_version": "vlm-pre-annotation-v1",
              "score": 0.95,
              "result": [
                {
                  "id": "自动生成的唯一ID",
                  "type": "rectanglelabels",
                  "from_name": "label",
                  "to_name": "image",
                  "image_rotation": 0,
                  "value": {
                    "rotation": 0,
                    "x": 0.0,
                    "y": 0.0,
                    "width": 0.0,
                    "height": 0.0,
                    "rectanglelabels": [
                      "Person"
                    ]
                  }
                }
              ]
            }
          ]
        }
      request:
        image_field: image_uri
        extra_payload:
          task: ppe_person
      response:
        format: boxes
        bbox_format: xyxy
        boxes_field: boxes
        label_field: label
        bbox_field: bbox
        confidence_field: score
      object_type_map:
        Person: person
        person: person

    area_segmentation:
      model_ref: area_segmenter_http
      request:
        image_field: image_uri
        extra_payload:
          task: ground_area
      response:
        format: objects
        objects_field: objects
      object_type_map:
        ground_area: ground_area
        yellow_black_line: yellow_black_line

    local_command_example:
      model_ref: local_detector_command
      response:
        format: boxes
        boxes_field: boxes
        label_field: label
        bbox_field: bbox
        confidence_field: score
      object_type_map:
        person: person

qc_policy:
  qc_mode: sampling
  sampling_ratio: 0.08
  sampling_method: random
  fail_policy: batch_rework
  qc_batch_id: null

export:
  export_format: labelstudio
  export_status: not_exported
  labelstudio_mapping: null
